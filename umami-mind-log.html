<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1A1108" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mind Log" />
  <title>Umami Mind Log</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #1A1108;
      --bg-deep:   #0E0A04;
      --bg-card:   #130F07;
      --gold:      #F0C96B;
      --gold-mid:  #C9A96E;
      --gold-dim:  #8B6F47;
      --gold-dark: #3D2E18;
      --green:     #7FB069;
      --green-bg:  #0A120A;
      --green-dim: #4A7A42;
      --red:       #C97B6E;
      --red-bg:    #120A0A;
      --red-dim:   #6E3A32;
      --text:      #E8D5A3;
      --mono:      'Courier Prime', monospace;
      --serif:     'Cormorant Garamond', Georgia, serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      overscroll-behavior: none;
    }

    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background:
        radial-gradient(ellipse at 15% 10%, #2C1F0E 0%, transparent 55%),
        radial-gradient(ellipse at 85% 90%, #0E0A04 0%, transparent 55%),
        var(--bg);
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px);
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px 12px;
      border-bottom: 1px solid var(--gold-dark);
    }
    .topbar-brand { font-size: 11px; letter-spacing: 4px; color: var(--gold-dim); text-transform: uppercase; }
    .topbar-title { font-size: 18px; color: var(--gold); letter-spacing: 1px; font-weight: 300; }
    .topbar-stats { text-align: right; }
    .stats-row { display: flex; gap: 10px; justify-content: flex-end; font-family: var(--mono); font-size: 13px; }
    .stat-c { color: var(--green); }
    .stat-d { color: var(--red); }
    .stats-sub { font-size: 10px; color: var(--gold-dim); margin-top: 2px; letter-spacing: 1px; }

    /* ── PHASE BAR ── */
    .phase-bar {
      display: flex;
      gap: 6px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--gold-dark);
    }
    .phase-label { font-size: 10px; letter-spacing: 3px; color: var(--gold-dim); text-transform: uppercase; align-self: center; margin-right: 4px; white-space: nowrap; }
    .phase-btn {
      flex: 1; padding: 8px 0;
      background: transparent;
      border: 1px solid var(--gold-dark);
      border-radius: 5px;
      color: var(--gold-dim);
      font-size: 12px;
      font-family: var(--serif);
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .phase-btn.active-Low  { background: #8B6F47; border-color: #8B6F47; color: var(--bg); font-weight: 600; }
    .phase-btn.active-Neutral { background: var(--gold-mid); border-color: var(--gold-mid); color: var(--bg); font-weight: 600; }
    .phase-btn.active-High { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: 600; }

    /* ── MAIN AREA ── */
    .main {
      flex: 1;
      padding: 24px 24px 0;
      display: flex;
      flex-direction: column;
    }

    .stage { animation: fadeUp 0.22s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stage-label {
      font-size: 10px; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 14px;
    }
    .label-neutral { color: var(--gold-dim); }
    .label-green   { color: var(--green-dim); }
    .label-red     { color: var(--red-dim); }

    /* Input */
    textarea {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid var(--gold-dark);
      border-radius: 8px;
      padding: 16px;
      color: var(--text);
      font-size: 17px;
      font-family: var(--serif);
      font-weight: 300;
      line-height: 1.65;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    textarea:focus { border-color: var(--gold-dim); }
    textarea::placeholder { color: #4A3520; font-style: italic; }

    /* Thought display card */
    .thought-card {
      border-radius: 8px;
      padding: 18px 20px;
      font-size: 16px;
      line-height: 1.7;
      font-style: italic;
      margin-bottom: 20px;
    }
    .thought-card.neutral { background: var(--bg-deep); border: 1px solid var(--gold-dark); color: var(--gold-mid); }
    .thought-card.green   { background: var(--green-bg); border: 1px solid #3A6A32; color: #A8D4A0; text-align: center; font-size: 17px; }
    .thought-card.red     { background: var(--red-bg);   border: 1px solid var(--red-dim); color: var(--red); text-align: center; }

    /* Buttons */
    .btn {
      width: 100%; padding: 15px;
      border: none; border-radius: 8px;
      font-size: 13px; font-family: var(--mono);
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      -webkit-appearance: none;
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold-mid), var(--gold));
      color: var(--bg);
    }
    .btn-gold:disabled { background: #2C1F0E; color: #4A3520; cursor: default; }
    .btn-green { background: linear-gradient(135deg, var(--green-dim), var(--green)); color: #0A120A; }
    .btn-red-outline { background: transparent; border: 1px solid var(--red); color: var(--red); }
    .btn-ghost { background: transparent; border: 1px solid var(--gold-dark); color: var(--gold-dim); }

    .btn-row { display: flex; gap: 10px; }
    .btn-row .btn { flex: 1; }

    /* Classify */
    .btn-classify-c { background: transparent; border: 1px solid var(--green); color: var(--green); }
    .btn-classify-d { background: transparent; border: 1px solid var(--red);   color: var(--red);   }

    /* Repeat dots */
    .dots { display: flex; gap: 10px; justify-content: center; margin: 16px 0; }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #2C1F0E;
      transition: background 0.3s, transform 0.3s;
    }
    .dot.filled { background: var(--green); transform: scale(1.2); }

    /* Repeat hint */
    .repeat-hint { font-size: 13px; color: var(--green-dim); text-align: center; margin-bottom: 18px; font-style: italic; }

    /* Release notes */
    .release-note { font-size: 13px; color: var(--red-dim); text-align: center; margin-bottom: 6px; }
    .release-sub  { font-size: 11px; color: #4A2A24; text-align: center; margin-bottom: 22px; letter-spacing: 1px; }

    /* Logged */
    .logged-icon {
      width: 58px; height: 58px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; font-size: 26px;
    }
    .logged-title { font-size: 16px; color: var(--gold-mid); text-align: center; margin-bottom: 6px; }
    .logged-sub   { font-size: 12px; color: var(--gold-dim); text-align: center; margin-bottom: 28px; font-style: italic; letter-spacing: 0.5px; }

    /* ── LOG HISTORY ── */
    .history-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px 0;
    }
    .history-toggle {
      background: none; border: none;
      color: var(--gold-dim); font-size: 10px;
      letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; font-family: var(--mono); padding: 0;
    }
    .copy-btn {
      background: none; border: 1px solid var(--gold-dark);
      border-radius: 4px; color: var(--gold-dim);
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; font-family: var(--mono); padding: 5px 10px;
      transition: color 0.2s, border-color 0.2s;
    }
    .copy-btn.done { color: var(--green); border-color: var(--green-dim); }

    .history-list { padding: 10px 24px 24px; display: flex; flex-direction: column; gap: 7px; }
    .history-entry {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 11px 13px; border-radius: 6px;
    }
    .entry-c { background: var(--green-bg); border: 1px solid #2A4A24; }
    .entry-d { background: var(--red-bg);   border: 1px solid #4A2A24; }
    .entry-time { font-family: var(--mono); font-size: 10px; min-width: 38px; padding-top: 2px; }
    .entry-time-c { color: var(--green-dim); }
    .entry-time-d { color: var(--red-dim); }
    .entry-text { flex: 1; font-size: 13px; font-style: italic; line-height: 1.5; }
    .entry-text-c { color: #A8D4A0; }
    .entry-text-d { color: var(--red); }
    .entry-phase { font-size: 10px; color: #4A3520; padding-top: 2px; font-family: var(--mono); }

    /* bottom padding */
    .spacer { height: 32px; }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div>
      <div class="topbar-brand">Umami</div>
      <div class="topbar-title">Mind Log</div>
    </div>
    <div class="topbar-stats">
      <div class="stats-row">
        <span class="stat-c" id="stat-c">C: 0</span>
        <span class="stat-d" id="stat-d">D: 0</span>
      </div>
      <div class="stats-sub" id="stat-ratio">no entries yet</div>
    </div>
  </div>

  <div class="phase-bar">
    <span class="phase-label">Phase</span>
    <button class="phase-btn" data-phase="Low"     onclick="setPhase('Low')">Low</button>
    <button class="phase-btn" data-phase="Neutral" onclick="setPhase('Neutral')">Neutral</button>
    <button class="phase-btn" data-phase="High"    onclick="setPhase('High')">High</button>
  </div>

  <div class="main" id="main"></div>

  <div class="history-bar" id="history-bar" style="display:none">
    <button class="history-toggle" onclick="toggleHistory()" id="history-toggle">▸ Today (0)</button>
    <button class="copy-btn" id="copy-btn" onclick="copyToNotes()">Copy to Notes</button>
  </div>
  <div class="history-list" id="history-list" style="display:none"></div>
  <div class="spacer"></div>
</div>

<script>
  // ── State ──
  let phase = 'Neutral';
  let currentThought = '';
  let currentType = null;
  let repeatCount = 0;
  let logs = [];
  let historyOpen = false;

  const HINTS = [
    "Say it again — let it land.",
    "Once more. Feel it this time.",
    "Third time. Own it.",
  ];

  // ── Init ──
  function init() {
    const saved = localStorage.getItem('umami_logs');
    if (saved) logs = JSON.parse(saved);

    const savedPhase = localStorage.getItem('umami_phase');
    const savedDate  = localStorage.getItem('umami_phase_date');
    if (savedPhase && savedDate === new Date().toDateString()) {
      phase = savedPhase;
    }

    updatePhaseUI();
    updateStats();
    renderStage('input');
    updateHistoryBar();

    // Auto-focus textarea after short delay
    setTimeout(() => {
      const ta = document.getElementById('thought-input');
      if (ta) ta.focus();
    }, 300);
  }

  // ── Phase ──
  function setPhase(p) {
    phase = p;
    localStorage.setItem('umami_phase', p);
    localStorage.setItem('umami_phase_date', new Date().toDateString());
    updatePhaseUI();
  }

  function updatePhaseUI() {
    document.querySelectorAll('.phase-btn').forEach(btn => {
      btn.className = 'phase-btn';
      if (btn.dataset.phase === phase) btn.classList.add('active-' + phase);
    });
  }

  // ── Stats ──
  function todayLogs() {
    const today = new Date().toDateString();
    return logs.filter(l => l.date === today);
  }

  function updateStats() {
    const tl = todayLogs();
    const c = tl.filter(l => l.type === 'C').length;
    const d = tl.filter(l => l.type === 'D').length;
    document.getElementById('stat-c').textContent = 'C: ' + c;
    document.getElementById('stat-d').textContent = 'D: ' + d;
    document.getElementById('stat-ratio').textContent =
      (c + d) === 0 ? 'no entries yet' : c + ':' + d + ' ratio';
  }

  // ── Time ──
  function nowTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // ── Render stages ──
  function renderStage(stage) {
    const el = document.getElementById('main');
    el.innerHTML = '';

    const wrap = document.createElement('div');
    wrap.className = 'stage';

    if (stage === 'input') {
      wrap.innerHTML = `
        <div class="stage-label label-neutral">Capture the thought</div>
        <textarea id="thought-input" rows="5"
          placeholder="What just passed through your mind..."
          oninput="onThoughtInput()"
          onkeydown="onThoughtKey(event)"
        ></textarea>
        <div style="height:14px"></div>
        <button class="btn btn-gold" id="name-btn" disabled onclick="goClassify()">Name It</button>
      `;
      el.appendChild(wrap);
      setTimeout(() => {
        const ta = document.getElementById('thought-input');
        if (ta) { ta.focus(); ta.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
      }, 100);
    }

    else if (stage === 'classify') {
      wrap.innerHTML = `
        <div class="stage-label label-neutral">Observe without judgment</div>
        <div class="thought-card neutral">"${esc(currentThought)}"</div>
        <div style="font-size:13px;color:var(--gold-dim);text-align:center;margin-bottom:16px;letter-spacing:1px;">This thought is —</div>
        <div class="btn-row">
          <button class="btn btn-classify-c" onclick="goRepeat('C')">↑ Constructive</button>
          <button class="btn btn-classify-d" onclick="goRelease('D')">↓ Destructive</button>
        </div>
      `;
      el.appendChild(wrap);
    }

    else if (stage === 'repeat') {
      wrap.innerHTML = `
        <div class="stage-label label-green">Reinforce — ${repeatCount + 1} of 3</div>
        <div class="thought-card green">"${esc(currentThought)}"</div>
        <div class="repeat-hint">${HINTS[repeatCount]}</div>
        <div class="dots">
          <div class="dot ${repeatCount >= 0 ? 'filled' : ''}"></div>
          <div class="dot ${repeatCount >= 1 ? 'filled' : ''}"></div>
          <div class="dot ${repeatCount >= 2 ? 'filled' : ''}"></div>
        </div>
        <button class="btn btn-green" onclick="handleRepeat()">
          ${repeatCount < 2 ? 'Say It Again' : 'Complete &amp; Log'}
        </button>
      `;
      el.appendChild(wrap);
    }

    else if (stage === 'release') {
      wrap.innerHTML = `
        <div class="stage-label label-red">Name it. Release it.</div>
        <div class="thought-card red">"${esc(currentThought)}"</div>
        <div class="release-note">This is phase noise. Not reality.</div>
        <div class="release-sub">You see it. You don't have to become it.</div>
        <button class="btn btn-red-outline" onclick="handleRelease()">Release &amp; Log</button>
      `;
      el.appendChild(wrap);
    }

    else if (stage === 'logged') {
      const isC = currentType === 'C';
      wrap.innerHTML = `
        <div style="text-align:center;padding-top:12px;">
          <div class="logged-icon" style="
            background:${isC ? 'var(--green-bg)' : 'var(--red-bg)'};
            border:1px solid ${isC ? 'var(--green)' : 'var(--red)'};
            color:${isC ? 'var(--green)' : 'var(--red)'};">
            ${isC ? '✓' : '○'}
          </div>
          <div class="logged-title">${isC ? 'Reinforced and logged.' : 'Named and released.'}</div>
          <div class="logged-sub">${isC ? 'That thought is yours now.' : 'It passed through. It doesn\'t define you.'}</div>
          <button class="btn btn-gold" onclick="goNext()">Log Another</button>
          <div style="height:12px"></div>
          <button class="btn btn-ghost" onclick="toggleHistory()">View Today's Log</button>
        </div>
      `;
      el.appendChild(wrap);
    }
  }

  // ── Input handlers ──
  function onThoughtInput() {
    const val = document.getElementById('thought-input').value;
    currentThought = val.trim();
    const btn = document.getElementById('name-btn');
    if (btn) btn.disabled = !currentThought;
  }

  function onThoughtKey(e) {
    if (e.key === 'Enter' && !e.shiftKey && currentThought) {
      e.preventDefault();
      goClassify();
    }
  }

  // ── Stage transitions ──
  function goClassify() {
    if (!currentThought) return;
    renderStage('classify');
  }

  function goRepeat(type) {
    currentType = type;
    repeatCount = 0;
    renderStage('repeat');
  }

  function goRelease(type) {
    currentType = type;
    renderStage('release');
  }

  function handleRepeat() {
    if (repeatCount < 2) {
      repeatCount++;
      renderStage('repeat');
    } else {
      saveEntry();
      renderStage('logged');
    }
  }

  function handleRelease() {
    saveEntry();
    renderStage('logged');
  }

  function goNext() {
    currentThought = '';
    currentType = null;
    repeatCount = 0;
    renderStage('input');
    if (historyOpen) updateHistoryList();
  }

  // ── Save ──
  function saveEntry() {
    const entry = {
      time: nowTime(),
      type: currentType,
      thought: currentThought,
      phase: phase,
      date: new Date().toDateString(),
    };
    logs.unshift(entry);
    localStorage.setItem('umami_logs', JSON.stringify(logs));
    updateStats();
    updateHistoryBar();
    if (historyOpen) updateHistoryList();
  }

  // ── History ──
  function updateHistoryBar() {
    const tl = todayLogs();
    const bar = document.getElementById('history-bar');
    bar.style.display = tl.length > 0 ? 'flex' : 'none';
    document.getElementById('history-toggle').textContent =
      (historyOpen ? '▾' : '▸') + ' Today (' + tl.length + ')';
  }

  function toggleHistory() {
    historyOpen = !historyOpen;
    const list = document.getElementById('history-list');
    list.style.display = historyOpen ? 'flex' : 'none';
    document.getElementById('history-toggle').textContent =
      (historyOpen ? '▾' : '▸') + ' Today (' + todayLogs().length + ')';
    if (historyOpen) updateHistoryList();
  }

  function updateHistoryList() {
    const tl = todayLogs();
    const el = document.getElementById('history-list');
    el.innerHTML = tl.map(e => `
      <div class="history-entry ${e.type === 'C' ? 'entry-c' : 'entry-d'}">
        <span class="entry-time ${e.type === 'C' ? 'entry-time-c' : 'entry-time-d'}">${e.time}</span>
        <span class="entry-text ${e.type === 'C' ? 'entry-text-c' : 'entry-text-d'}">"${esc(e.thought)}"</span>
        <span class="entry-phase">${e.phase[0]}</span>
      </div>
    `).join('');
  }

  // ── Copy to notes ──
  function copyToNotes() {
    const tl = todayLogs();
    const c = tl.filter(l => l.type === 'C').length;
    const d = tl.filter(l => l.type === 'D').length;
    const dateStr = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    const lines = [
      `THOUGHT LOG — ${dateStr}`,
      `Phase: ${phase}  |  C: ${c}  |  D: ${d}  |  Ratio: ${c}:${d}`,
      ``,
      ...tl.map(e => `${e.time}  [${e.type}]  "${e.thought}"  (${e.phase})`),
      ``,
      `---`,
    ];
    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied ✓';
      btn.classList.add('done');
      setTimeout(() => { btn.textContent = 'Copy to Notes'; btn.classList.remove('done'); }, 2000);
    });
  }

  // ── Utils ──
  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Boot ──
  init();
</script>
</body>
</html>
